name: zavashop-stockout

x-agent-env: &agent-env
  ZAVA_COPILOT_MODEL: gpt-5.5
  ZAVA_COPILOT_TIMEOUT_SECONDS: "120"
  ZAVA_INVENTORY_MCP_URL: http://inventory-mcp:8080/mcp
  ZAVA_SUPPLIER_MCP_URL: http://supplier-mcp:8080/mcp
  ZAVA_SHIPPING_MCP_URL: http://shipping-mcp:8080/mcp
  ZAVA_PRICING_MCP_URL: http://pricing-mcp:8080/mcp
  ZAVA_INVENTORY_A2A_URL: http://inventory:8000/invoke
  ZAVA_SUPPLIER_A2A_URL: http://supplier:8000/invoke
  ZAVA_LOGISTICS_A2A_URL: http://logistics:8000/invoke
  ZAVA_PRICING_A2A_URL: http://pricing:8000/invoke
  GITHUB_TOKEN: ${GITHUB_TOKEN:?set GITHUB_TOKEN in your shell}

x-agent-healthcheck: &agent-healthcheck
  test:
    - CMD
    - python
    - -c
    - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"
  interval: 10s
  timeout: 3s
  retries: 12
  start_period: 15s

x-mcp-healthcheck: &mcp-healthcheck
  test:
    - CMD
    - python
    - -c
    - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"
  interval: 10s
  timeout: 3s
  retries: 12
  start_period: 15s

services:
  zavashop-base:
    image: zavashop-base:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/Dockerfile.base
    command: ["python", "-c", "import time; time.sleep(1)"]
    profiles: ["build"]

  inventory-mcp:
    image: zavashop/inventory-mcp:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/mcp_servers/inventory/Dockerfile
    healthcheck: *mcp-healthcheck

  supplier-mcp:
    image: zavashop/supplier-mcp:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/mcp_servers/supplier/Dockerfile
    healthcheck: *mcp-healthcheck

  shipping-mcp:
    image: zavashop/shipping-mcp:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/mcp_servers/shipping/Dockerfile
    healthcheck: *mcp-healthcheck

  pricing-mcp:
    image: zavashop/pricing-mcp:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/mcp_servers/pricing/Dockerfile
    healthcheck: *mcp-healthcheck

  inventory:
    image: zavashop/inventory:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/agents/inventory/Dockerfile
      args:
        BASE_IMAGE: zavashop-base:${GIT_SHA:?set GIT_SHA to the current git SHA}
    environment: *agent-env
    depends_on:
      inventory-mcp:
        condition: service_healthy
    healthcheck: *agent-healthcheck

  supplier:
    image: zavashop/supplier:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/agents/supplier/Dockerfile
      args:
        BASE_IMAGE: zavashop-base:${GIT_SHA:?set GIT_SHA to the current git SHA}
    environment: *agent-env
    depends_on:
      supplier-mcp:
        condition: service_healthy
    healthcheck: *agent-healthcheck

  logistics:
    image: zavashop/logistics:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/agents/logistics/Dockerfile
      args:
        BASE_IMAGE: zavashop-base:${GIT_SHA:?set GIT_SHA to the current git SHA}
    environment: *agent-env
    depends_on:
      shipping-mcp:
        condition: service_healthy
    healthcheck: *agent-healthcheck

  pricing:
    image: zavashop/pricing:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/agents/pricing/Dockerfile
      args:
        BASE_IMAGE: zavashop-base:${GIT_SHA:?set GIT_SHA to the current git SHA}
    environment: *agent-env
    depends_on:
      pricing-mcp:
        condition: service_healthy
    healthcheck: *agent-healthcheck

  orchestrator:
    image: zavashop/orchestrator:${GIT_SHA:?set GIT_SHA to the current git SHA}
    build:
      context: .
      dockerfile: src/agents/orchestrator/Dockerfile
      args:
        BASE_IMAGE: zavashop-base:${GIT_SHA:?set GIT_SHA to the current git SHA}
    environment: *agent-env
    depends_on:
      inventory:
        condition: service_healthy
      supplier:
        condition: service_healthy
      logistics:
        condition: service_healthy
      pricing:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck: *agent-healthcheck