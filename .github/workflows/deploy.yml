name: deploy

# Mirror of /ship-it: build → push → roll ACA → helm upgrade AKS → smoke + evals.
# Triggered on push to main, gated by the `check` job in ci.yml: this workflow
# starts via `workflow_run` only after ci concludes with `success` on main, so
# `uv run poe check` (and `uv run poe audit`) must be green before any image
# is built. Auth uses OIDC federation (azure/login@v2 with federated-token);
# there is intentionally no `client-secret:` key anywhere in this file.

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  ship-it:
    name: ship-it
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      id-token: write
      contents: read
    env:
      ACR: ${{ vars.ACR }}
      RG: ${{ vars.RG }}
      CAE: ${{ vars.CAE }}
      AKS: ${{ vars.AKS }}
      KV: ${{ vars.KV }}
      UAMI_RESOURCE_ID: ${{ vars.UAMI_RESOURCE_ID }}
      UAMI_CLIENT_ID: ${{ vars.UAMI_CLIENT_ID }}
    steps:
      - name: Checkout (head SHA from ci run)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve short SHA
        id: sha
        run: |
          GIT_SHA="${GITHUB_SHA::7}"
          echo "GIT_SHA=$GIT_SHA" >> "$GITHUB_ENV"
          echo "sha=$GIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build base image (ACR Tasks, linux/amd64)
        run: |
          az acr build -r "$ACR" --platform linux/amd64 \
            -t "zavashop/base:${{ steps.sha.outputs.sha }}" \
            -f src/Dockerfile.base .

      - name: Build & push 9 service images in parallel
        env:
          BASE: ${{ env.ACR }}.azurecr.io/zavashop/base:${{ steps.sha.outputs.sha }}
          GIT_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          mkdir -p .build-logs
          for svc in inventory supplier logistics pricing orchestrator; do
            ( az acr build -r "$ACR" --platform linux/amd64 \
                --build-arg BASE="$BASE" \
                -t "zavashop/$svc:$GIT_SHA" \
                -f "src/agents/$svc/Dockerfile" . \
                > ".build-logs/$svc.log" 2>&1 \
              && echo "OK $svc" || { echo "FAIL $svc"; exit 1; } ) &
          done
          for mcp in inventory supplier shipping pricing; do
            ( az acr build -r "$ACR" --platform linux/amd64 \
                --build-arg BASE="$BASE" \
                -t "zavashop/${mcp}-mcp:$GIT_SHA" \
                -f "src/mcp_servers/$mcp/Dockerfile" . \
                > ".build-logs/${mcp}-mcp.log" 2>&1 \
              && echo "OK ${mcp}-mcp" || { echo "FAIL ${mcp}-mcp"; exit 1; } ) &
          done
          wait
          az acr repository list -n "$ACR" -o tsv | sort

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acr-build-logs-${{ steps.sha.outputs.sha }}
          path: .build-logs/

      - name: Roll ACA (4 specialists + 4 MCPs)
        env:
          GIT_SHA: ${{ steps.sha.outputs.sha }}
        run: bash infra/aca/deploy.sh

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.RG }}
          cluster-name: ${{ vars.AKS }}

      - name: Helm upgrade orchestrator
        run: |
          helm upgrade --install zavashop infra/aks/helm/zavashop \
            --namespace zavashop --create-namespace \
            --set image.repository="$ACR.azurecr.io/zavashop/orchestrator" \
            --set image.tag="${{ steps.sha.outputs.sha }}"
          kubectl -n zavashop rollout status deploy/orchestrator --timeout=5m

      - name: Smoke + evals against the public IP
        run: |
          set -euo pipefail
          ORCH=$(kubectl -n zavashop get svc orchestrator \
                  -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -fsS -X POST "http://$ORCH/plan" \
            -H 'content-type: application/json' \
            -d '{"goal":"smoke","sku":"ZS-1042","store_id":"store-101"}' \
            | tee smoke.json | jq -e '.summary' > /dev/null
          uv sync --frozen
          ZAVA_EVAL_LATENCY_BUDGET=240 \
            ZAVA_ENDPOINT="http://$ORCH" \
            uv run python -m tests.evals.run_evals

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ steps.sha.outputs.sha }}
          path: tests/evals/results/
