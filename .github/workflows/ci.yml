name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Diagnose venv
        run: |
          echo "--- .venv/lib contents ---"
          ls -la .venv/lib/ || true
          echo "--- python version ---"
          .venv/bin/python --version
          echo "--- pyright version ---"
          uv run pyright --version
          echo "--- agent_framework_core dist-info ---"
          ls .venv/lib/python*/site-packages/agent_framework_core-*.dist-info/ || true
          echo "--- agent_framework/__init__.py first 30 lines ---"
          head -30 .venv/lib/python*/site-packages/agent_framework/__init__.py
          echo "--- agent_framework/__init__.py byte count ---"
          wc -c .venv/lib/python*/site-packages/agent_framework/__init__.py
          echo "--- runtime diagnostic ---"
          .venv/bin/python .github/scripts/diagnose_af.py

      - name: Lint, format, type-check, test, coverage
        run: uv run poe check

      - name: Security audit
        run: uv run poe audit

  evals:
    name: evals
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'run-evals')
    env:
      ZAVA_ENDPOINT: http://localhost:8000
      GITHUB_TOKEN: ${{ secrets.ZAVA_GITHUB_COPILOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Start fleet
        run: docker compose up -d --wait

      - name: Run evals
        run: uv run poe evals

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: tests/evals/results/

      - name: Stop fleet
        if: always()
        run: docker compose down -v
